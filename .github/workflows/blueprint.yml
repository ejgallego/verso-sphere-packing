name: Blueprint Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pages:
    uses: ejgallego/verso-blueprint/.github/workflows/blueprint-pages.yml@v4.28.0
    with:
      checkout_submodules: true
      harness_enabled: true
      warm_dependency_cache: true
    secrets: inherit
